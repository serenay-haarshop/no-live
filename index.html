function getSiteMap(lang){
  return lang==="de" ? SITE_MAP_DE : lang==="en" ? SITE_MAP_EN : lang==="pro" ? SITE_MAP_PRO : SITE_MAP_NL;
}

/* Look up the Magento category ID from a URL via the sitemap */
function getCatIdFromUrl(url, lang){
  const map = getSiteMap(lang||"nl");
  const match = map.find(p=>p.url===url);
  return match && match.catId ? match.catId : null;
}

function getRelated(url, lang){
  const cfg = DOMAIN_CONFIG[lang||"nl"];
  const map = getSiteMap(lang||"nl");
  const base = cfg.base;
  const path = url.replace(base,"");
  const segs = path.split("/").filter(Boolean);

  // parent pagina (één niveau hoger)
  const parentPath = segs.length>1 ? "/"+segs.slice(0,-1).join("/") : null;
  const parent = parentPath ? map.find(p=>p.url.replace(base,"")===parentPath) : null;

  // directe kinderen (subcategorieën)
  const kids = map.filter(p=>{
    const pp = p.url.replace(base,"");
    return pp.startsWith(path+"/") && pp.split("/").filter(Boolean).length===segs.length+1;
  });

  // siblings: zustercategorieën met hetzelfde parent — DOMINANT voor SEO
  const parentSeg = segs.length>1 ? segs[segs.length-2] : null;
  const sibs = parentSeg ? map.filter(p=>{
    if(p.url===url) return false;
    const pp = p.url.replace(base,"");
    const ps = pp.split("/").filter(Boolean);
    return ps.length===segs.length && ps[segs.length-2]===parentSeg;
  }) : [];

  // cross-category: ALLEEN binnen dezelfde niche, max 1-2
  const crossMap = {
    // Haarverzorging — alleen haar ↔ haar
    "shampoo":["haarverzorging/conditioners","haarverzorging/haarmasker"],
    "conditioners":["haarverzorging/shampoo","haarverzorging/haarmasker"],
    "leave-in-conditioners":["haarverzorging/conditioners","haarverzorging/haarmasker"],
    "haarmasker":["haarverzorging/conditioners","haarverzorging/haarolie"],
    "treatment":["haarverzorging/haarmasker","haarverzorging/hoofdhuid-oplossingen"],
    "haarolie":["haarverzorging/haarmasker","haarverzorging/leave-in-conditioners"],
    "hoofdhuid-oplossingen":["haarverzorging/shampoo","haarverzorging/treatment"],
    "haarstyling":["haarverzorging/shampoo"],
    "haarkleuringen":["haarverzorging/shampoo","haarverzorging/conditioners"],
    "haaraccessoires":["haarverzorging/haarstyling"],
    "alle-voordeelsets":["haarverzorging/shampoo","haarverzorging/haarmasker"],
    "extensions":["haarverzorging/haaraccessoires"],
    // Styling sub — alleen styling ↔ styling
    "krullen-creme":["haarverzorging/haarstyling/wax","haarverzorging/haarstyling/schuimverstevigers"],
    "styling-creme-wax":["haarverzorging/haarstyling/wax","haarverzorging/haarstyling/haar-paste"],
    "haar-paste":["haarverzorging/haarstyling/wax","haarverzorging/haarstyling/styling-creme-wax"],
    "wax":["haarverzorging/haarstyling/haar-paste","haarverzorging/haarstyling/gel"],
    "gel":["haarverzorging/haarstyling/wax","haarverzorging/haarstyling/pommade"],
    "pommade":["haarverzorging/haarstyling/gel","haarverzorging/haarstyling/wax"],
    "volume-poeder":["haarverzorging/haarstyling/gel","haarverzorging/haarstyling/haar-paste"],
    "schuimverstevigers":["haarverzorging/haarstyling/krullen-creme"],
    // Huidverzorging — alleen huid ↔ huid
    "gezicht":["huidverzorging/lichaam","huidverzorging/oogverzorging"],
    "lichaam":["huidverzorging/gezicht","huidverzorging/tanning"],
    "tanning":["huidverzorging/lichaam","huidverzorging/ontharen"],
    "ontharen":["huidverzorging/lichaam"],
    "oogverzorging":["huidverzorging/gezicht"],
    // DE
    "conditioner":["haarpflege/shampoo","haarpflege/haarmaske"],
    "haarmaske":["haarpflege/conditioner","haarpflege/leave-in-conditioner"],
    "leave-in-conditioner":["haarpflege/conditioner","haarpflege/haarmaske"],
    "hair-treatment":["haarpflege/haarmaske","haarpflege/kopfhautprobleme"],
    "kopfhautprobleme":["haarpflege/shampoo","haarpflege/hair-treatment"],
    "haarfarben":["haarpflege/shampoo","haarpflege/conditioner"],
    "gesichtspflege":["beautypflege/korperpflege"],
    "korperpflege":["beautypflege/gesichtspflege"],
    // EN
    "hair-mask":["hair-care/conditioner","hair-care/hair-oil"],
    "hair-oil":["hair-care/hair-mask","hair-care/leave-in-conditioner"],
    "scalp-care":["hair-care/shampoo","hair-care/treatment"],
    "styling-finishing":["hair-care/shampoo"],
    "hair-coloring":["hair-care/shampoo","hair-care/conditioner"],
    "face-care":["skin-care/body-care"],
    "body-care":["skin-care/face-care","skin-care/tanning"],
    // PRO
    "kappers-interieur":["professioneel/knipbenodigdheden","professioneel/kleurbenodigdheden"],
    "kappers-scharen":["professioneel/knipbenodigdheden"],
    "knipbenodigdheden":["professioneel/kleurbenodigdheden"],
    "kleurbenodigdheden":["professioneel/knipbenodigdheden","haarverzorging/haarkleuringen"],
    "stijltangen":["tools/krultangen-warme-fohnborstels","tools/haardrogers"],
    "tondeuses-trimmers":["tools/trimmers"],
    "trimmers":["tools/tondeuses-trimmers"],
    "kammen":["tools/borstels"],
    "borstels":["tools/kammen"],
    "acryl-nagels":["nagels/brisa-gel-nagels","nagels/shellac"],
    "brisa-gel-nagels":["nagels/acryl-nagels","nagels/shellac"],
    "shellac":["nagels/manicure","nagels/acryl-nagels"],
    "manicure":["nagels/pedicure","nagels/shellac"],
    "pedicure":["nagels/manicure"],
  };
  const currentSlug = segs[segs.length-1] || "";
  const crossPaths = crossMap[currentSlug] || [];
  const crossLinks = crossPaths.map(cp=>map.find(p=>p.url===base+"/"+cp)).filter(Boolean);

  const result = [];
  const seen = new Set([url]);
  const add = (p, relation) => {
    if(!seen.has(p.url)){seen.add(p.url); result.push({label:p.label, url:p.url, relation});}
  };

  // Determine the top-level category (niche) of the current URL
  const topCategory = segs[0] || "";

  // PRIORITEIT: siblings (zelfde niche) > children > same-niche from sitemap > parent > cross-category (max 1)
  // 1. Siblings — zelfde parent, zelfde niche (max 5)
  sibs.slice(0,5).forEach(p=>add(p,"sibling"));
  // 2. Children — subcategorieën (max 3)
  kids.slice(0,3).forEach(p=>add(p,"child"));
  // 3. Same top-level category links — andere pagina's in dezelfde niche die niet al sibling/child zijn (max 3)
  const sameNiche = map.filter(p=>{
    if(p.url===url || seen.has(p.url)) return false;
    const pp = p.url.replace(base,"").split("/").filter(Boolean);
    return pp[0]===topCategory && pp.length<=segs.length+1;
  });
  sameNiche.slice(0,3).forEach(p=>add(p,"same-niche"));
  // 4. Parent — breadcrumb (1)
  if(parent) add(parent, "parent");
  // 5. Cross-category — max 1, alleen als echt relevant
  crossLinks.slice(0,1).forEach(p=>add(p,"cross-category"));

  return result;
}

async function claude(msg,tokens=4000,search=false,lang="nl"){
  if(!_key)throw new Error("Geen API-sleutel ingevuld. Voer je sleutel in via het slotje rechtsbovenin.");
  const body={model:"claude-sonnet-4-20250514",max_tokens:tokens,system:getSystem(lang),messages:[{role:"user",content:msg}]};
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  console.log("⏱ API call start — max_tokens:",tokens,"prompt length:",msg.length,"chars");
  var t0=Date.now();
  let r;
  try {
    r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":_key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify(body),
    });
  } catch(e) {
    throw new Error("Netwerkfout: "+e.message);
  }
  let d;
  try { d = await r.json(); } catch(e) { throw new Error("Ongeldig API-antwoord (status "+r.status+")"); }
  if(!r.ok || d.error) {
    const msg = d?.error?.message || ("API fout "+r.status);
    if(r.status===401) throw new Error("API-sleutel ongeldig of verlopen. Controleer je sleutel. ("+msg+")");
    if(r.status===400) throw new Error("Verzoek afgewezen: "+msg);
    if(r.status===529||r.status===503) throw new Error("API overbelast, probeer het over een moment opnieuw. ("+msg+")");
    throw new Error("API fout "+r.status+": "+msg);
  }
  const content=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text||"").join("");
  console.log("⏱ API call done in",((Date.now()-t0)/1000).toFixed(1)+"s — response length:",content.length,"chars");
  if(!content){throw new Error("Lege API-respons - geen tekstinhoud ontvangen.");}
  return content;
}

function xj(raw){
  var s=raw.lastIndexOf('{"pageType"');
  if(s<0)s=raw.lastIndexOf('{"metaTitle"');
  if(s<0)s=raw.indexOf("{");
  var e=raw.lastIndexOf("}");
  if(s<0||e<0)throw new Error("Geen JSON gevonden in API-respons.");
  var txt=raw.slice(s,e+1);
  function tp(t){try{return JSON.parse(t);}catch(e){return null;}}
  var r=tp(txt);if(r)return r;
  txt=txt.replace(/[\r\n\t]+/g," ");
  r=tp(txt);if(r)return r;
  txt=txt.replace(/,\s*([}\]])/g,"$1");
  r=tp(txt);if(r)return r;
  txt=txt.replace(/\\"/g,'"').replace(/([^\\])\\([^\\])/g,'$1$2');
  r=tp(txt);if(r)return r;
  var fixed="";var inStr=false;var esc=false;
  for(var i=0;i<txt.length;i++){
    var ch=txt[i];
    if(esc){fixed+=ch;esc=false;continue;}
    if(ch==="\\"){fixed+=ch;esc=true;continue;}
    if(ch==='"'){
      if(!inStr){inStr=true;fixed+=ch;}
      else{
        var after=txt.slice(i+1).trimStart();
        if(after[0]===":"||after[0]===","||after[0]==="}"||after[0]==="]"||after[0]==="/"||after.length===0){inStr=false;fixed+=ch;}
        else{fixed+="\\\"";}
      }
    }else{fixed+=ch;}
  }
  r=tp(fixed);if(r)return r;
  // Try to repair truncated JSON by closing open brackets/braces
  var repaired=fixed;
  if(inStr)repaired+='"';
  var opens=0;var closes=0;var arrOpens=0;var arrCloses=0;
  for(var j=0;j<repaired.length;j++){var c2=repaired[j];if(c2==='{')opens++;if(c2==='}')closes++;if(c2==='[')arrOpens++;if(c2===']')arrCloses++;}
  while(arrOpens>arrCloses){repaired+=']';arrCloses++;}
  while(opens>closes){repaired+='}';closes++;}
  r=tp(repaired);if(r){console.warn("JSON was truncated but repaired successfully");return r;}
  console.error("JSON parse failed. Raw response:",raw.substring(0,500));
  throw new Error("JSON parse error. API respons is ongeldig. De respons was waarschijnlijk te lang en werd afgekapt. Probeer het opnieuw.");
}

  return schemaFAQ.map(function(f){

    var text=(f.answer||"").replace(/"/g,"&quot;");

let _magentoProxy=sessionStorage.getItem("hs_mage_proxy")||"";

async function magentoFetch(endpoint,magentoKey,options){
  var proxy=sessionStorage.getItem("hs_mage_proxy")||"";
  var headers=Object.assign({"Content-Type":"application/json","Authorization":"Bearer "+magentoKey},options&&options.headers||{});
  var fetchUrl=endpoint;
  
  // If proxy is configured, route through it
  if(proxy){
    fetchUrl=proxy.replace(/\/$/,""); // remove trailing slash
    headers["X-Target-URL"]=endpoint;
    console.log("🔌 Using CORS proxy:",fetchUrl,"→",endpoint);
  }else{
    console.log("🔌 Direct Magento call (no proxy):",endpoint);
  }
  
  var resp=await fetch(fetchUrl,Object.assign({},options,{headers:headers}));
  if(!resp.ok){
    var txt=await resp.text();
    throw new Error("Magento API "+resp.status+": "+txt);
  }
  return resp.json();
}

function flattenCategories(node,path){
  var results=[];
  var currentPath=path?path+" > "+node.name:node.name;
  results.push({id:node.id,name:node.name,path:currentPath,level:node.level,isActive:node.is_active,productCount:node.product_count});
  if(node.children_data){
    for(var i=0;i<node.children_data.length;i++){
      results=results.concat(flattenCategories(node.children_data[i],currentPath));
    }
  }
  return results;
}

/* ── HTML BLOCK VIEWER ── */
function HtmlModal({code, onClose}){
  const[copied,sCopied]=useState(false);
  return ReactDOM.createPortal(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.55)",backdropFilter:"blur(3px)"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:"#fff",borderRadius:16,width:"min(780px,95vw)",maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 80px rgba(0,0,0,.3)"}}>
      <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.bdr}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div>
          <div style={{fontSize:14,fontWeight:900,color:C.ink}}>Clean HTML</div>
          <div style={{fontSize:11.5,color:C.ink3,marginTop:1}}>Kopieer en plak direct in Magento 2 → Category → Description → HTML-modus</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button className="btn btn-primary btn-sm" onClick={()=>{navigator.clipboard.writeText(code);sCopied(true);setTimeout(()=>sCopied(false),2000);}}>
            {copied?"✓ Gekopieerd":"⎘ Kopieer HTML"}
          </button>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:"50%",border:`1px solid ${C.bdr}`,background:C.cream,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",color:C.ink3}}>✕</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:20}}>
        <pre style={{background:"#1e1e2e",color:"#a6e3a1",borderRadius:10,padding:18,fontSize:11.5,fontFamily:"'Courier New',monospace",lineHeight:1.75,whiteSpace:"pre-wrap",wordBreak:"break-all",margin:0}}>{code}</pre>
      </div>
      <div style={{padding:"12px 20px",borderTop:`1px solid ${C.bdr}`,background:C.cream,borderRadius:"0 0 16px 16px",fontSize:11.5,color:C.ink3,flexShrink:0}}>
        Stap 1: Magento Admin → Catalog → Categories → kies categorie · Stap 2: Klik op "Description" veld · Stap 3: Klik op het <strong style={{color:C.ink}}>&lt;/&gt;</strong> HTML-icoon · Stap 4: Plak de code · Stap 5: Sla op
      </div>
    </div>
  </div>, document.body);
}

function HtmlBtn({code, label="</> HTML"}){
  const[open,sOpen]=useState(false);
  return<>
    <button className="btn btn-ghost btn-sm" onClick={()=>sOpen(true)} style={{fontFamily:"monospace",letterSpacing:"-.02em"}}>{label}</button>
    {open&&<HtmlModal code={code} onClose={()=>sOpen(false)}/>}
  </>;
}

/* ── TRANSLATION TOGGLE ── */
function TranslationToggle({lang, children}){
  const[showNl,sShowNl]=useState(false);
  if(lang==="nl"||lang==="pro") return children(false);
  return<div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
      <div style={{display:"flex",background:"#f0ece8",borderRadius:20,padding:2,border:`1px solid #e0d5cb`}}>
        <button onClick={()=>sShowNl(false)} style={{fontSize:11.5,fontWeight:700,padding:"4px 14px",borderRadius:18,border:"none",cursor:"pointer",background:!showNl?"#fff":"transparent",color:!showNl?"#1a1a1a":"#999",transition:"all .15s",fontFamily:"var(--f)",boxShadow:!showNl?"0 1px 4px rgba(0,0,0,.12)":"none"}}>
          {lang==="de"?"🇩🇪 Duits":"🇬🇧 English"}
        </button>
        <button onClick={()=>sShowNl(true)} style={{fontSize:11.5,fontWeight:700,padding:"4px 14px",borderRadius:18,border:"none",cursor:"pointer",background:showNl?"#fff":"transparent",color:showNl?"#1a1a1a":"#999",transition:"all .15s",fontFamily:"var(--f)",boxShadow:showNl?"0 1px 4px rgba(0,0,0,.12)":"none"}}>
          🇳🇱 Nederlands
        </button>
      </div>
      {showNl&&<span style={{fontSize:10.5,color:"#c4967a",fontWeight:700,background:"#f5e8df",padding:"2px 10px",borderRadius:20,border:"1px solid #e8c9b8"}}>Vertaling — niet publiceren</span>}
    </div>
    {children(showNl)}
  </div>;
}
function Spin({s=16}){return<svg className="spin-a" width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="2.5" strokeDasharray="28 56" strokeLinecap="round"/></svg>;}

function ProgressBar({active, durationMs=40000}){
  if(!active) return null;
  return<div style={{width:"100%",marginTop:10}}>
    <div style={{height:6,background:"#e8e0d8",borderRadius:3,overflow:"hidden"}}>
      <div className="prog-fill" style={{height:"100%",width:"0%",background:"linear-gradient(90deg,#c4956a,#e8b87a)",borderRadius:3,animation:`progAnim ${durationMs}ms ease-out forwards`}}/>
    </div>
    <style>{`@keyframes progAnim { 0%{width:0%} 30%{width:35%} 60%{width:60%} 80%{width:78%} 100%{width:92%} }`}</style>
  </div>;
}
function CopyBtn({text,label="Kopieer"}){const[d,sd]=useState(false);return<button className="btn btn-ghost btn-sm" onClick={()=>{navigator.clipboard.writeText(text);sd(true);setTimeout(()=>sd(false),2000);}}>{d?"✓ Gekopieerd":`⎘ ${label}`}</button>;}
function VolBar({val}){const pct=Math.min(100,Math.round((val/60000)*100));const col=pct>55?"#2e7d32":pct>25?C.beige:"#bbb";const fmt=val>=1000?(val/1000).toFixed(1)+"k":val;return<div className="vw"><div className="vbg"><div className="vfill" style={{width:`${pct}%`,background:col}}/></div><span style={{fontSize:12,fontWeight:700,color:C.ink}}>{fmt}</span></div>;}
function KdPill({kd}){const col=kd>65?C.red:kd>40?"#e67e22":"#27ae60";const lbl=kd>65?"Hoog":kd>40?"Gemid.":"Laag";return<span className="pill" style={{background:col+"18",color:col,border:`1px solid ${col}30`}}><span style={{width:5,height:5,borderRadius:"50%",background:col,display:"inline-block"}}/>{kd} · {lbl}</span>;}
function IntentTag({intent}){const m={transactioneel:[C.beige,C.blush2],informatief:[C.green,"#e8f5ee"],navigatief:["#666","#f0f0f0"]};const[col,bg]=m[(intent||"").toLowerCase()]||["#777","#eee"];return<span className="pill" style={{background:bg,color:col}}>{intent}</span>;}
function TrendBadge({trend}){const m={stijgend:["#27ae60","↗"],dalend:[C.red,"↘"],stabiel:["#999","→"]};const[col,icon]=m[trend]||["#999","→"];return<span style={{color:col,fontSize:15,fontWeight:800}}>{icon}</span>;}

const TOOL_PASSWORD = "SEOhaarshop123";
function addTargetBlank(html){
  if(!html)return html;
  return html.replace(/<a\s+href=/g,'<a target="_blank" rel="noopener noreferrer" href=');
}

function EditBtn({id,editMode,sEditMode}){
  var active=editMode===id;
  return <button onClick={function(e){e.stopPropagation();sEditMode(active?null:id);}} style={{fontSize:11,padding:"2px 8px",border:"1px solid "+(active?"#27ae60":"#ccc"),borderRadius:4,background:active?"#eafaf1":"#fff",color:active?"#27ae60":"#666",cursor:"pointer",marginLeft:6}}>{active?"\u2714 Klaar":"\u270F Bewerken"}</button>;
}

function PasswordScreen({onSuccess}){
  const[pw,sPw]=useState("");const[err,sErr]=useState("");const[show,sShow]=useState(false);

      </div>

/* ── APP ── */
function App(){
  const[authed,sAuthed]=useState(!!sessionStorage.getItem("hs_auth"));
  const[hasKey,sHasKey]=useState(!!localStorage.getItem("hs_key"));
  const _saved=(()=>{try{const s=sessionStorage.getItem("hs_state");return s?JSON.parse(s):null;}catch(e){return null;}})();
  const[url,sUrl]=useState(_saved?.url||"");
  const[lang,sLang]=useState(_saved?.lang||"nl");
  const[phase,sPhase]=useState(_saved?.content?"done":"idle");
  const[status,sStatus]=useState("");
  const[a,sA]=useState(_saved?.analysis||null);
  const[c,sC]=useState(_saved?.content||null);
  const[html,sHtml]=useState(_saved?.html||"");
  const[err,sErr]=useState(null);
  const[tab,sTab]=useState("intro");
  const[hl,sHl]=useState("intro");
  const[prev,sPrev]=useState(!!_saved?.content);
  const[pushed,sPushed]=useState(false);
  const[progActive,sProgActive]=useState(false);
  const[showBar,sShowBar]=useState(false); // unused, kept for compat
  const[magentoKey,sMagentoKey]=useState(sessionStorage.getItem("hs_mage_key")||"");
  const[magentoHostUrl,sMagentoHostUrl]=useState(sessionStorage.getItem("hs_mage_host")||"https://www.haarshop.nl");
  const[magentoCategories,sMagentoCategories]=useState(null);
  const[magentoCatSearch,sMagentoCatSearch]=useState("");
  const[magentoCatId,sMagentoCatId]=useState(null);
  const[magentoCatName,sMagentoCatName]=useState("");
  const[magentoLoading,sMagentoLoading]=useState(false);
  const[magentoStatus,sMagentoStatus]=useState("");
  const[magentoProxy,sMagentoProxy]=useState(sessionStorage.getItem("hs_mage_proxy")||"");
  const[magentoShowPayload,sMagentoShowPayload]=useState(false);
  const[showStagingConfirm,sShowStagingConfirm]=useState(false);
  const[publishConfirm,sPublishConfirm]=useState(null); // null or {envLabel, catId, catLabel}
  const[globalHtmlCode,sGlobalHtmlCode]=useState(null); // null or string — for HTML viewer modal
  const[fbSection,sFbSection]=useState(null); // which section is getting feedback
  const[fbText,sFbText]=useState(""); // feedback text
  const[fbLoading,sFbLoading]=useState(false); // loading state for regen

    const[editMode,sEditMode]=useState(null);
  const updateC=function(path,value){sC(function(prev){var next=JSON.parse(JSON.stringify(prev));var keys=path.split(".");var obj=next;for(var i=0;i<keys.length-1;i++){obj=obj[keys[i]];}obj[keys[keys.length-1]]=value;return next;});};
  useEffect(function(){if(c&&a){sHtml(buildHTML(c,a));}},[c,a]);
  useEffect(()=>{const m={intro:"intro",main:"main",seo:"seo",ai:"ai",meta:"h1",faq:"h1",magento:"h1"};sHl(m[tab]||"intro");},[tab]);
  useEffect(()=>{
    // Auto-update Magento host to production URL for selected lang, unless staging is active
    if(!magentoHostUrl.includes("staging")){
      const prodHost=DOMAIN_CONFIG[lang]?.base||"https://www.haarshop.nl";
      sMagentoHostUrl(prodHost);sessionStorage.setItem("hs_mage_host",prodHost);
      sMagentoCategories(null);sMagentoCatId(null);sMagentoStatus("");
    }
  },[lang]);

  const doAnalyse=useCallback(async()=>{
    if(!url.trim())return;sErr(null);sPhase("analyzing");sStatus("Pagina analyseren en zoekwoorden bepalen…");sProgActive(true);sShowBar(true);
    try{
      const r=await analyse(url.trim(),lang);
      sA(r);
      sPhase("generating");sStatus("SEO-content schrijven…");
      const g=await genContent(r,lang);
      if(!g.metaKeywords)g.metaKeywords=[];
      // Fallback: generate aiSnippet if missing
      if(!g.aiSnippet||g.aiSnippet.length<20){
        var pk=r.keywords?.find(k=>k.type==="primary")||r.keywords?.[0];
        var snippetPrompt="Schrijf een AI search snippet van 60-75 woorden voor een categoriepagina over \""+( pk?.term||"")+"\" op "+DOMAIN_CONFIG[lang].brand+". Het snippet is verborgen op de pagina (display:none) en bedoeld voor Google SGE, ChatGPT en Perplexity. Schrijf in het "+{nl:"Nederlands",de:"Duits",en:"Engels",pro:"Nederlands"}[lang]+". Retourneer ALLEEN de platte tekst, geen JSON, geen aanhalingstekens.";
        try{g.aiSnippet=await claude(snippetPrompt,300,false,lang);}catch(e2){console.warn("aiSnippet fallback failed:",e2);}
      }
      sC(g);sHtml(buildHTML(g,r));
      sProgActive(false);sPhase("done");sTab("intro");sPrev(true);setTimeout(()=>sShowBar(false),5000);
      sessionStorage.setItem("hs_state",JSON.stringify({analysis:r,content:g,url:url.trim(),lang}));
    }
    catch(e){sErr("Fout: "+e.message);sProgActive(false);sShowBar(false);sPhase("idle");console.error("Error:",e);}
  },[url,lang]);

  const doGen=useCallback(async()=>{
    if(!a)return;sErr(null);sPhase("generating");sStatus("Menselijk klinkende SEO-teksten schrijven…");
    try{const r=await genContent(a,lang);if(!r.metaKeywords)r.metaKeywords=[];sC(r);sHtml(buildHTML(r,a));sPhase("done");sTab("intro");sPrev(true);sessionStorage.setItem("hs_state",JSON.stringify({analysis:a,content:r,html:buildHTML(r,a),url,lang}));}
    catch(e){sErr("Content fout: "+e.message);sPhase("reviewing");console.error("Content error:",e);}
  },[a,lang]);

  const doRegen=useCallback(async(sectionKey,feedback)=>{
    if(!c||!a||!feedback.trim())return;
    sFbLoading(true);sErr(null);
    try{
      const result=await regenSection(sectionKey,feedback,c,a,lang);
      // Merge the regenerated section back into content
      const updated={...c};
      if(sectionKey==="introText"){
        updated.introText=result.introText||result.intro||c.introText;
        if(result.introTextNl) updated.introTextNl=result.introTextNl;
      } else if(sectionKey==="metaFields"){
        if(result.metaTitle) updated.metaTitle=result.metaTitle;
        if(result.metaDescription) updated.metaDescription=result.metaDescription;
        if(result.metaKeywords) updated.metaKeywords=result.metaKeywords;
        if(result.metaTitleNl) updated.metaTitleNl=result.metaTitleNl;
        if(result.metaDescriptionNl) updated.metaDescriptionNl=result.metaDescriptionNl;
      } else if(sectionKey==="schemaFAQ"){
        updated.schemaFAQ=result.schemaFAQ||result;
      } else if(sectionKey==="aiSnippet"){
        updated.aiSnippet=result.aiSnippet||c.aiSnippet;
        if(result.aiSnippetNl) updated.aiSnippetNl=result.aiSnippetNl;
      } else {
        // mainContent section (h2_what, h2_hairtype, etc.)
        updated.mainContent={...c.mainContent,[sectionKey]:result[sectionKey]||result};
      }
      sC(updated);
      sHtml(buildHTML(updated,a));
      sFbSection(null);sFbText("");
      sessionStorage.setItem("hs_state",JSON.stringify({analysis:a,content:updated,html:buildHTML(updated,a),url,lang}));
    }catch(e){sErr("Herschrijf fout: "+e.message);console.error("Regen error:",e);}
    finally{sFbLoading(false);}
  },[c,a,lang]);

  const reset=()=>{sPhase("idle");sA(null);sC(null);sErr(null);sPrev(false);sFbSection(null);sFbText("");sessionStorage.removeItem("hs_state");};

  // Content editing handler
  const updateField=useCallback((path,value)=>{
    if(!c)return;
    const updated=JSON.parse(JSON.stringify(c));
    const parts=path.split(".");
    let obj=updated;
    for(let i=0;i<parts.length-1;i++){
      if(!obj[parts[i]])obj[parts[i]]={};
      obj=obj[parts[i]];
    }
    obj[parts[parts.length-1]]=value;
    sC(updated);
    sHtml(buildHTML(updated,a));
    sessionStorage.setItem("hs_state",JSON.stringify({analysis:a,content:updated,html:buildHTML(updated,a),url,lang}));
  },[c,a,url,lang]);

  const EditableText=({value,path,multiline,style:cs})=>{
    const[editing,setEditing]=useState(false);
    const[draft,setDraft]=useState(value||"");
    useEffect(()=>{setDraft(value||"");},[value]);
    if(editing){
      return<div style={{position:"relative"}}>{multiline
        ?<textarea value={draft} onChange={e=>setDraft(e.target.value)} style={{width:"100%",minHeight:80,fontSize:13,padding:10,borderRadius:8,border:"1.5px solid "+C.beige,fontFamily:"var(--f)",resize:"vertical",boxSizing:"border-box"}}/>
        :<input type="text" value={draft} onChange={e=>setDraft(e.target.value)} style={{fontSize:13}}/>}
        <div style={{display:"flex",gap:6,marginTop:6}}>
          <button onClick={()=>{updateField(path,draft);setEditing(false);}} className="btn btn-primary" style={{fontSize:11,padding:"5px 14px"}}>Opslaan</button>
          <button onClick={()=>{setDraft(value||"");setEditing(false);}} className="btn btn-ghost" style={{fontSize:11,padding:"5px 14px"}}>Annuleer</button>
        </div>
      </div>;
    }
    return<div onClick={()=>setEditing(true)} style={{cursor:"pointer",position:"relative",borderRadius:6,padding:"2px 4px",margin:"-2px -4px",transition:"background .15s"}} onMouseEnter={e=>{e.currentTarget.style.background="rgba(196,150,122,0.08)";}} onMouseLeave={e=>{e.currentTarget.style.background="transparent";}} title="Klik om te bewerken">{multiline
      ?<div style={cs||{}} dangerouslySetInnerHTML={{__html:value||""}}/>
      :<span style={cs||{}}>{value||""}</span>}
      <span style={{position:"absolute",top:2,right:2,fontSize:10,opacity:.4}}>{String.fromCodePoint(9999)}</span>
    </div>;
  };

  // Inline feedback block for section-level regeneration — uses LOCAL state for text
  const FeedbackBlock = ({sectionKey, label}) => {
    const isOpen = fbSection === sectionKey;
    const[localText,sLocalText]=useState("");
    return <div style={{marginTop:10}}>
      {!isOpen && <button onClick={()=>{sFbSection(sectionKey);sLocalText("");}} style={{fontSize:11.5,fontWeight:700,padding:"6px 14px",borderRadius:20,cursor:"pointer",border:`1px solid ${C.bdr}`,background:"#fff",color:C.ink3,fontFamily:"var(--f)",transition:"all .15s"}} disabled={fbLoading}>
        ✏️ Feedback op {label||sectionKey}
      </button>}
      {isOpen && <div style={{background:"#fef9f0",border:`1px solid #f0dbb8`,borderRadius:10,padding:14,marginTop:4}}>
        <div style={{fontSize:12,fontWeight:800,color:C.ink,marginBottom:6}}>✏️ Feedback: {label||sectionKey}</div>
        <textarea value={localText} onChange={e=>sLocalText(e.target.value)} placeholder="Beschrijf wat je wilt aanpassen... (bijv. 'meer focus op professioneel gebruik' of 'de tweede alinea klopt niet, het moet gaan over...')" style={{width:"100%",minHeight:70,fontSize:13,padding:10,borderRadius:8,border:`1px solid #e0d5cb`,fontFamily:"var(--f)",resize:"vertical",boxSizing:"border-box"}}/>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={()=>doRegen(sectionKey,localText)} disabled={fbLoading||!localText.trim()} style={{fontSize:12,fontWeight:700,padding:"7px 18px",borderRadius:20,cursor:"pointer",border:"none",background:C.ink,color:"#fff",fontFamily:"var(--f)",opacity:fbLoading||!localText.trim()?.5:1}}>
            {fbLoading?"⏳ Herschrijven...":"🔄 Herschrijf deze sectie"}
          </button>
          <button onClick={()=>{sFbSection(null);sLocalText("");}} style={{fontSize:12,fontWeight:600,padding:"7px 14px",borderRadius:20,cursor:"pointer",border:`1px solid ${C.bdr}`,background:"#fff",color:C.ink3,fontFamily:"var(--f)"}}>Annuleer</button>
        </div>
      </div>}
    </div>;
  };

  if(!authed)return<PasswordScreen onSuccess={()=>sAuthed(true)}/>;
  if(!hasKey)return<KeyScreen onSave={()=>sHasKey(true)}/>;

  const TABS=[{k:"intro",l:"Introductie"},{k:"main",l:"Hoofdtekst"},{k:"meta",l:"Meta"},{k:"faq",l:"FAQ Schema"},{k:"ai",l:"AI Snippet"},{k:"magento",l:"Magento 2"}];

              </div>
              <PagePreview content={c} url={url} highlight={hl}/>
              <div style={{marginTop:9,display:"flex",gap:5}}>
                {[["intro","Intro"],["main","Hoofdtekst"],["seo","SEO"],["ai","AI"]].map(([key,lbl])=>(
                  <button key={key} onClick={()=>sTab(key)} style={{flex:1,fontSize:11,padding:"7px",borderRadius:20,cursor:"pointer",border:`1px solid ${tab===key?C.ink:C.bdr}`,fontFamily:"var(--f)",fontWeight:700,background:tab===key?C.ink:"#fff",color:tab===key?"#fff":C.ink3,transition:"all .15s"}}>{lbl}</button>
                ))}
              </div>
            </div>}
          </div>
        </div>
      )}

      {/* IDLE */}
      {phase==="idle"&&<div className="fu" style={{textAlign:"center",padding:"60px 20px 80px"}}>
        <div style={{width:68,height:68,borderRadius:20,background:C.blush2,border:`2px solid ${C.blush}`,margin:"0 auto 18px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>✂</div>
        <div style={{fontSize:28,fontWeight:900,color:C.ink,marginBottom:10}}>Haarshop SEO Content Machine</div>
        <div style={{fontSize:15,color:C.ink3,maxWidth:500,margin:"0 auto 38px",lineHeight:1.8}}>Plak een URL, de tool analyseert de Google NL SERP, berekent zoekvolumes en schrijft publiceerbare content die menselijk klinkt.</div>
        <div style={{display:"flex",gap:13,justifyContent:"center",flexWrap:"wrap"}}>
          {[["📊","Keyword Research","Live SERP-analyse voor NL"],["🏆","Concurrentieanalyse","DA, verkeer en rangoorzaken"],["✍️","Menselijke copy","Geen AI-uitstraling, geen opsommingen"],["👁","Pagina-preview","Zie exact waar tekst staat"],["⚡","Magento 2","Direct publiceren via REST API"]].map(([icon,title,sub])=>(
            <div key={title} style={{background:"#fff",border:`1px solid ${C.bdr}`,borderRadius:12,padding:"17px 19px",width:180,textAlign:"left",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
              <div style={{fontSize:21,marginBottom:7}}>{icon}</div>
              <div style={{fontSize:13.5,fontWeight:800,color:C.ink,marginBottom:3}}>{title}</div>
              <div style={{fontSize:12,color:C.ink3,lineHeight:1.5}}>{sub}</div>
            </div>
          ))}
        </div>
      </div>}
    </main>

    {/* === MODALS — portalled to document.body for proper fixed centering === */}
    {showStagingConfirm&&ReactDOM.createPortal(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.5)",backdropFilter:"blur(3px)"}} onClick={e=>{if(e.target===e.currentTarget)sShowStagingConfirm(false);}}>
      <div style={{background:"#fff",borderRadius:16,padding:"36px 40px",maxWidth:440,width:"95%",boxShadow:"0 24px 80px rgba(0,0,0,.25)",fontFamily:"var(--f)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <div style={{width:48,height:48,borderRadius:12,background:"#fff3e0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>⚠️</div>
          <div style={{fontSize:20,fontWeight:900,color:C.ink,lineHeight:1.3}}>Overschakelen naar Staging?</div>
        </div>
        <div style={{fontSize:14,color:C.ink2,lineHeight:1.7,marginBottom:24}}>
          Je schakelt over naar de <strong style={{color:"#e65100"}}>STAGING omgeving</strong> van Haarshop. Dit is de testomgeving — wijzigingen hier zijn <strong>niet zichtbaar</strong> op de live site.
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={function(){sShowStagingConfirm(false);}} className="btn btn-ghost" style={{fontSize:13,padding:"10px 22px"}}>Annuleer</button>
          <button onClick={function(){sMagentoHostUrl("https://staging.haarshop.nl");sessionStorage.setItem("hs_mage_host","https://staging.haarshop.nl");sMagentoCategories(null);sMagentoCatId(null);sMagentoStatus("");sShowStagingConfirm(false);}} className="btn" style={{fontSize:13,padding:"10px 22px",background:"#e65100",color:"#fff",fontWeight:800}}>Ja, gebruik Staging</button>
        </div>
      </div>
    </div>, document.body)}

    {publishConfirm&&ReactDOM.createPortal(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.5)",backdropFilter:"blur(3px)"}} onClick={e=>{if(e.target===e.currentTarget)sPublishConfirm(null);}}>
      <div style={{background:"#fff",borderRadius:16,padding:"36px 40px",maxWidth:480,width:"95%",boxShadow:"0 24px 80px rgba(0,0,0,.25)",fontFamily:"var(--f)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <div style={{width:48,height:48,borderRadius:12,background:publishConfirm.envLabel==="STAGING"?"#fff3e0":"#e8f5e9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{publishConfirm.envLabel==="STAGING"?"🧪":"🚀"}</div>
          <div style={{fontSize:20,fontWeight:900,color:C.ink,lineHeight:1.3}}>Publiceren naar {publishConfirm.envLabel}?</div>
        </div>
        <div style={{background:C.cream,border:"1px solid "+C.bdr,borderRadius:10,padding:"14px 18px",marginBottom:20}}>
          <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"6px 14px",fontSize:13}}>
            <span style={{fontWeight:800,color:C.ink3}}>Host</span><span style={{fontWeight:700,color:C.ink}}>{magentoHostUrl}</span>
            <span style={{fontWeight:800,color:C.ink3}}>Categorie</span><span style={{fontWeight:700,color:C.ink}}>{publishConfirm.catLabel} <span style={{color:C.ink3,fontWeight:600}}>(ID: {publishConfirm.catId})</span></span>
            <span style={{fontWeight:800,color:C.ink3}}>Website</span><span style={{fontWeight:700,color:C.ink}}>{DOMAIN_CONFIG[lang].magentoCode}</span>
          </div>
        </div>
        <div style={{fontSize:13,color:"#c62828",fontWeight:700,marginBottom:20,background:"#fbe9e7",border:"1px solid #ef9a9a",borderRadius:8,padding:"10px 14px"}}>⚠ Dit overschrijft de bestaande content op deze categoriepagina!</div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={function(){sPublishConfirm(null);}} className="btn btn-ghost" style={{fontSize:13,padding:"10px 22px"}}>Annuleer</button>
          <button onClick={async function(){
            var pc=publishConfirm;sPublishConfirm(null);
            sMagentoLoading(true);sMagentoStatus("loading:Verbinden met "+pc.envLabel+"...");sPushed(false);
            try{
              var host=magentoHostUrl+"/rest/"+DOMAIN_CONFIG[lang].magentoCode+"/V1";
              var payload=buildMagentoPutPayload(pc.catId,c);
              console.log("📤 Publishing to:",host+"/categories/"+pc.catId);
              sMagentoStatus("loading:Payload verzenden naar categorie "+pc.catId+"...");
              await magentoFetch(host+"/categories/"+pc.catId,magentoKey,{method:"PUT",body:JSON.stringify(payload)});
              sPushed(true);sMagentoStatus("success:Succesvol gepubliceerd naar "+pc.catLabel+" (ID: "+pc.catId+") op "+pc.envLabel+"!");
            }catch(e){
              console.error("❌ Publish error:",e);
              var errMsg=e.message||"Onbekende fout";
              if(errMsg.includes("Failed to fetch")||errMsg.includes("NetworkError")){errMsg="CORS fout — controleer je CORS proxy URL.";}
              sMagentoStatus("error:"+errMsg);
            }
            sMagentoLoading(false);
          }} className="btn" style={{fontSize:13,padding:"10px 22px",background:C.ink,color:"#fff",fontWeight:800}}>Ja, publiceer nu</button>
        </div>
      </div>
    </div>, document.body)}

    {/* Ahrefs notice */}
    <div style={{position:"fixed",bottom:20,right:20,zIndex:300,background:C.ink,color:"#fff",borderRadius:10,padding:"11px 15px",fontSize:12,fontFamily:"var(--f)",maxWidth:230,boxShadow:"0 4px 20px rgba(0,0,0,.2)",lineHeight:1.6}}>
      <div style={{fontWeight:800,marginBottom:2}}>Ahrefs niet gekoppeld</div>
      <div style={{opacity:.6,fontSize:11}}>Verbind Ahrefs voor exacte API-volumes. Nu actief: SERP-analyse.</div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
